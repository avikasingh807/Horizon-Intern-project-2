<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Serum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Image Section -->
  <div class="product-image">
    <img id="mainImage" src="https://images.pexels.com/photos/31812004/pexels-photo-31812004.jpeg" alt="Serum">

    <div class="small-images">
      <img src="https://images.pexels.com/photos/35524993/pexels-photo-35524993.jpeg" onclick="changeImage(this)">
      <img src="https://images.pexels.com/photos/2113894/pexels-photo-2113894.jpeg" onclick="changeImage(this)">
      <img src="https://images.pexels.com/photos/4110346/pexels-photo-4110346.jpeg" onclick="changeImage(this)">
    </div>
  </div>

  <!-- Product Details -->
  <div class="product-details">

    <h1>Glow Vitamin C Serum</h1>

    <div class="rating">⭐⭐⭐⭐☆ (4.5)</div>

    <p class="price">₹799</p>

    <p class="description">
      Brighten your skin with our Vitamin C Serum.
      Reduces dark spots, hydrates deeply, and gives a natural glow.
    </p>

    <!-- Skin Type -->
    <label>Skin Type:</label>
    <select>
      <option>All Skin Types</option>
      <option>Dry Skin</option>
      <option>Oily Skin</option>
    </select>

    <!-- Size -->
    <label>Size:</label>
    <select>
      <option>30ml</option>
      <option>50ml</option>
    </select>

    <!-- Buttons -->
    <button onclick="addToCart()">🛒 Add to Cart</button>
    <button onclick="addToWishlist()">❤️ Wishlist</button>

    <p id="cartMsg"></p>

  </div>

</div>

<!-- Reviews Section -->
<div class="reviews">
  <h2>Customer Reviews</h2>

  <div class="review-box">
    <p>⭐️⭐️⭐️⭐️⭐️</p>
    <p>Amazing product! My skin is glowing ✨</p>
  </div>

  <div class="review-box">
    <p>⭐️⭐️⭐️⭐️</p>
    <p>Very lightweight and hydrating.</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
